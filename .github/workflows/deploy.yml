name: Deploy to EKS

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-eks
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPO: vibe-kanban-v1
  EKS_CLUSTER: ai-cart-auto-cluster
  K8S_NAMESPACE: aicart
  K8S_DEPLOYMENT: vibe-kanban-v1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin \
              970547373533.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Set image tags
        id: tags
        run: |
          IMAGE_TAG="${GITHUB_SHA::8}"
          REPO_URI="970547373533.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "repo_uri=${REPO_URI}" >> "$GITHUB_OUTPUT"
          echo "Image: ${REPO_URI}:${IMAGE_TAG}"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.tags.outputs.repo_uri }}:${{ steps.tags.outputs.image_tag }} \
            -t ${{ steps.tags.outputs.repo_uri }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.tags.outputs.repo_uri }}:${{ steps.tags.outputs.image_tag }}
          docker push ${{ steps.tags.outputs.repo_uri }}:latest

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION
          kubectl set image deployment/$K8S_DEPLOYMENT \
            server=${{ steps.tags.outputs.repo_uri }}:${{ steps.tags.outputs.image_tag }} \
            -n $K8S_NAMESPACE
          kubectl rollout status deployment/$K8S_DEPLOYMENT \
            -n $K8S_NAMESPACE --timeout=300s
          echo "Deployment completed successfully"

      - name: Verify pod health
        run: |
          kubectl get pods -n $K8S_NAMESPACE -l app=$K8S_DEPLOYMENT
          POD=$(kubectl get pods -n $K8S_NAMESPACE -l app=$K8S_DEPLOYMENT \
            -o jsonpath='{.items[0].metadata.name}')
          HEALTH=$(kubectl exec -n $K8S_NAMESPACE "$POD" -- \
            wget -qO- http://localhost:3000/healthz)
          echo "Health check: $HEALTH"
