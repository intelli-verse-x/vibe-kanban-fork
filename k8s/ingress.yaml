apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vibe-kanban-v1-ingress
  namespace: aicart
  annotations:
    alb.ingress.kubernetes.io/load-balancer-name: intelliverse-apis-alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:970547373533:certificate/c5a0e339-3eb5-4ff7-b9d3-7eccfb055331
    alb.ingress.kubernetes.io/subnets: subnet-081072daa41808d00, subnet-0c12ed7ffedf6610d, subnet-0effa916462e32901
    alb.ingress.kubernetes.io/security-groups: sg-01c4f3c9d4b5c5e98
    alb.ingress.kubernetes.io/group.name: intelliverse-apis
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400
spec:
  ingressClassName: alb
  rules:
    - host: vk1.intelli-verse-x.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vibe-kanban-v1
                port:
                  number: 80
  tls:
    - hosts:
        - vk1.intelli-verse-x.ai
      secretName: intelliverse-tls
